<!DOCTYPE html>
<html>
<head>
    <title>Card Battle Game</title>
        <style>
                body {
                            background: linear-gradient(135deg, #1a1a2e, #16213e);
                                        color: white;
                                                    font-family: Arial;
                                                                padding: 20px;
                                                                            text-align: center;
                                                                                    }
                                                                                            .card {
                                                                                                        display: inline-block;
                                                                                                                    background: rgba(255,255,255,0.1);
                                                                                                                                border: 2px solid #aaa;
                                                                                                                                            border-radius: 15px;
                                                                                                                                                        padding: 15px;
                                                                                                                                                                    margin: 10px;
                                                                                                                                                                                width: 180px;
                                                                                                                                                                                        }
                                                                                                                                                                                                .card.my { border-color: limegreen; }
                                                                                                                                                                                                        .btn {
                                                                                                                                                                                                                    padding: 10px 20px;
                                                                                                                                                                                                                                margin: 5px;
                                                                                                                                                                                                                                            background: #00a8ff;
                                                                                                                                                                                                                                                        color: white;
                                                                                                                                                                                                                                                                    border: none;
                                                                                                                                                                                                                                                                                border-radius: 8px;
                                                                                                                                                                                                                                                                                            cursor: pointer;
                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                            .btn.attack { background: red; font-size: 20px; padding: 15px 40px; }
                                                                                                                                                                                                                                                                                                                    #log {
                                                                                                                                                                                                                                                                                                                                background: rgba(0,0,0,0.5);
                                                                                                                                                                                                                                                                                                                                            padding: 15px;
                                                                                                                                                                                                                                                                                                                                                        border-radius: 10px;
                                                                                                                                                                                                                                                                                                                                                                    max-width: 500px;
                                                                                                                                                                                                                                                                                                                                                                                margin: 20px auto;
                                                                                                                                                                                                                                                                                                                                                                                            font-size: 18px;
                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                        </style>
                                                                                                                                                                                                                                                                                                                                                                                                        </head>
                                                                                                                                                                                                                                                                                                                                                                                                        <body>

                                                                                                                                                                                                                                                                                                                                                                                                            <h1>⚔️ CARD BATTLE ⚔️</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                    <button class="btn" id="connectBtn">🔐 Connect Wallet</button>
                                                                                                                                                                                                                                                                                                                                                                                                                        <button class="btn" id="loadBtn">📂 Load My Deck</button>
                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="log">Click Connect to start...</div>

                                                                                                                                                                                                                                                                                                                                                                                                                                    <h3>📚 Available Cards</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                        <div id="allCards"></div>

                                                                                                                                                                                                                                                                                                                                                                                                                                            <h3>🎒 My Deck</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="myDeck"></div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                    <h3>⚔️ Battle</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        <input type="text" id="opponent" placeholder="Paste Opponent Principal ID here..." style="padding:10px; width:350px;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                            <br><br>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button class="btn attack" id="fightBtn">ATTACK! ⚔️</button>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    let actor = null;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const CANISTER_ID = "$$canister_id$$";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                            async function connect() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    await window.ic.connect();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            actor = await window.ic.createActor(CANISTER_ID, ({ IDL }) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        return IDL.Service({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        'start': IDL.Func([], []),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        'allCards': IDL.Func([], [IDL.Array({ id:IDL.Nat, name:IDL.Text, attack:IDL.Nat, defense:IDL.Nat })], ['query']),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        'myDeck': IDL.Func([], [IDL.Array({ id:IDL.Nat, name:IDL.Text, attack:IDL.Nat, defense:IDL.Nat })], ['query']),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        'add': IDL.Func([IDL.Nat], [IDL.Text]),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        'battle': IDL.Func([IDL.Principal], [IDL.Text]),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    await actor.start();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            log("✅ Connected!");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    showCards();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function log(text) { document.getElementById("log").innerText = text; }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                async function showCards() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const cards = await actor.allCards();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const div = document.getElementById("allCards");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        div.innerHTML = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                cards.forEach(c => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            div.innerHTML += `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="card">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <h4>${c.name}</h4>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <p>⚔️ ${c.attack} | 🛡️ ${c.defense}</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <button class="btn" onclick="addCard(${c.id})">+ Add</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    `;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    window.addCard = async function(id) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if(!actor) return alert("Connect first!");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const res = await actor.add(id);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            log(res);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    loadDeck();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            async function loadDeck() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const cards = await actor.myDeck();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const div = document.getElementById("myDeck");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    div.innerHTML = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            cards.forEach(c => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        div.innerHTML += `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="card my">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <h4>${c.name}</h4>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p>⚔️ ${c.attack} | 🛡️ ${c.defense}</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            `;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById("fightBtn").onclick = async function() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if(!actor) return alert("Connect first!");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const id = document.getElementById("opponent").value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const result = await actor.battle(id);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            log(result);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } catch(e) { log("Error: " + e.message); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById("connectBtn").onclick = connect;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById("loadBtn").onclick = loadDeck;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
